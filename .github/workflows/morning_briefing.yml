name: Jarvis-Yul Morning Total Briefing

on:
  schedule:
    # 한국 시간(KST) 아침 08:00 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x java-core/gradlew

      - name: Run Total Briefing Task
        working-directory: java-core
        # 'ALL'을 던져서 메일, 뉴스, 주식을 한꺼번에 처리합니다.
        run: ./gradlew run --args='ALL'
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}